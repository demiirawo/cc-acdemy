name: Deploy to Cloudflare Pages

# Builds the app and deploys it to the "cc-acdemy" Cloudflare Pages project
# (https://cc-acdemy.pages.dev) on every push to main. Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN  - a token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID - your Cloudflare account id
# The VITE_SUPABASE_* values are read from the committed .env at build time.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cc-acdemy --branch=main
